server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback so /room/JAM-1234 deep links work
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + streaming to the backend service
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Album cover art — served from the backend's cacheable /art endpoint
    location /art/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /stream/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # WebSocket upgrade
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
